// Optional.The default is empty.
// It is used when the witness account has set the witnessPermission.
// When it is not empty, the localWitnessAccountAddress represents the address of the witness account,
// and the localwitness is configured with the private key of the witnessPermissionAddress in the witness account.
// When it is empty,the localwitness is configured with the private key of the witness account.

//localWitnessAccountAddress =

localwitness = [
]

#localwitnesskeystore = [

event.subscribe = {
  enable = __EVENT_ENABLE__
  version = 1
  startSyncBlockNum = __EVENT_START_SYNC_BLOCK_NUM__

  native {
    useNativeQueue = false
    bindport = 5555
    sendqueuelength = 1000
  }

  path = "/usr/local/tron/plugins/plugin-kafka.zip"
  server = "__KAFKA_SERVER__"
  dbconfig = ""
  contractParse = true

  topics = [
    { triggerName = "block", enable = true, topic = "block", solidified = false },
    { triggerName = "transaction", enable = true, topic = "transaction", solidified = false, ethCompatible = false },
    { triggerName = "contractevent", enable = true, topic = "contractevent" },
    { triggerName = "contractlog", enable = true, topic = "contractlog", redundancy = false }
  ]

  filter = {
    fromblock = ""
    toblock = ""
    contractAddress = [""]
    contractTopic = [""]
  }
}
