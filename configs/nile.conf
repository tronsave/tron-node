# Nile testnet — minimal overrides for java-tron 4.8.2.
# Unlisted settings use built-in defaults (framework/src/main/resources/config.conf).
# Runtime placeholders (__HTTP_PORT__, etc.) are replaced by docker-entrypoint.sh.

storage {
  # Must match existing database; default in 4.8.2 official config is commented out (version 2 recommended).
  checkpoint.version = 2

  merkleRoot = {
    reward-vi = b474b61f93824cd70106f8f5283fa740d61b83a7d57a3c12401d627f1fae0a77
  }
}

# Required for P2P peer discovery (UDP on listen.port). persist=false so a crash
# cannot permanently disable discovery via the properties DB.
node.discovery = {
  enable = true
  persist = false
}

node {
  listen.port = __P2P_PORT__

  p2p { version = 201910292 }

  isOpenFullTcpDisconnect = true

  http {
    fullNodeEnable = true
    fullNodePort = __HTTP_PORT__
    solidityEnable = false
  }

  rpc { port = __GRPC_PORT__ }

  jsonrpc {
    httpFullNodeEnable = true
    httpFullNodePort = __JSONRPC_PORT__
    httpSolidityEnable = false
    httpPBFTEnable = false
  }

  # Lite FullNode: use a lite snapshot database; see README.
  openHistoryQueryWhenLiteFN = __LITE_OPEN_HISTORY__
}

